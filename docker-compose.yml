services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: html_php_1
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - withdraw_net

  webserver:
    image: nginx:1.27-alpine
    container_name: withdraw_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    networks:
      - withdraw_net
    depends_on:
      - app

volumes:
  storage_data:

networks:
  withdraw_net:
    driver: bridge
